version: 2

workflows:

  summarize:
    mission: Summarize a completed research session as a self-contained encyclopedia entry. It composes onto any flow, reads the whole session, and names no inputs, so it runs last by id order.
    children:
      - summarize:
          mission: From the completed session's report, write a stand-alone encyclopedia entry a reader can understand without the original report. Give it a short, informative title and the index fields that place it in the encyclopedia. Write a context passage that orients the reader to the technical domain, setting the scientific context only, and do not repeat the research or the discovery. Then write an executive summary for each audience that states the finding succinctly and elaborates in a paragraph highlighting what is most novel or surprising versus what is already known. Write one for an intelligent layperson outside the field (simplify, avoid jargon) and one for a scientist working in the field, each standing on its own. Write the context, main finding, and elaboration as statements. When a statement rests on an AutoDiscovery run, a Theorizer artifact, or a DataVoyager run from this session, cite it by that run or artifact's own id copied from the session; never invent an id or cite one you cannot find in the session, and leave basic background knowledge uncited. Author output_json only; compile-report.py renders the cover, the deep-link header, and the body.
          output: {summary: summary}

  reflection:
    mission: Capture the executing agent's feedback on how the session ran. It composes onto any flow, reads the whole session, and names no inputs, so it runs last by id order.
    children:
      - reflection:
          mission: The session is finished. Look back over the run and record how it went, as feedback rather than science. Note where the flow, schema, or tools got in your way or cost you rework, and the concrete changes that would have made the run go better. Point at the real tasks, fields, and tools involved.
          output: {reflection: reflection}

  data_provenance:
    mission: Source the papers and datasets the AutoDiscovery run was built on. Identify the publication of record behind each run dataset, read its data- and code-availability section directly to learn where the data live and how to obtain them, acquire the open data so it becomes the data in hand, and record what could not be obtained. This runs before reproduction so the underlying data is sourced rather than assumed.
    children:
      - provenance_search:
          mission: Read the run's dataset descriptions and intent from its metadata, then search the literature for the paper(s) that published or describe each dataset. Emit one data_source per run dataset naming the candidate source paper (paper_id, title, url).
          cli: [asta literature, asta papers]
          output: {data_sources: [data_source]}
      - provenance_extraction:
          mission: Read each candidate paper's data- and code-availability section directly from the publication of record to capture where the data live and how to obtain them, the repository, the accession or DOI, and the underlying products it draws on. Going to the article is more reliable here than a cross-paper extraction, which is heavier and can substitute papers when a recent one is not yet indexed; reserve that for gathering evidence across many papers. When a paper's data come from several underlying products, record each as its own sub-source. Emit one source_access per data_source (keyed by its id); the data_source records themselves are immutable.
          cli: [asta papers, asta pdf-extraction]
          input: [provenance_search]
          output: {extracted_data: ref(extracted_data), source_access: [source_access]}
      - data_acquisition:
          mission: For each openly available source, fetch the data files and register them as a dataset, the data in hand that reproduction and novelty_assessment later use. Emit one acquisition per data_source with access_status, local_path, and the registered dataset_id. Validate every fetched dataset against its paper before registering it (n, schema/variables, units, missingness), and record the check in validation_note; a dataset that fails validation is a gap, not an input. For restricted or not-found data, record a gap rather than blocking downstream work.
          cli: [asta documents, asta autodiscovery]
          input: [provenance_search, provenance_extraction]
          output: {acquisitions: [acquisition], datasets: [dataset]}

  theorizer:
    mission: Explain the cross-cutting theories behind the reproduced laws — anchored to the run's own stated intent and dataset context, grounded in the literature and the reproduction's numbers, and generated by running the Theorizer in parallel under both a literature focus and a novelty focus — then triage them for testability and score their novelty.
    children:
      - theory_formation:
          mission: Reconstruct the original user's intent from the run's own metadata — its stated intent and the descriptions of its datasets — and distil it into the query and framing you give the Theorizer, so the theories serve what the user set out to learn. On the same reproduced laws, run the managed Theorizer twice and in parallel — one literature-focused pass grounded in established results and one novelty-focused pass surfacing non-obvious mechanisms and new predictions — submitting both concurrently and collecting both. Emit the union of theories, each tagged with the objective that produced it, all relevant to the user's intent and cross-cutting (each explaining several reproduced laws), grounded in both the literature and the reproduction's effect sizes and verdicts. Drop any law the audit confirmed as a mistake; keep a law that did not reproduce but carry its negative signal as conflicting evidence. Populate conflicting_evidence, and make unaccounted_for address the partial and untestable laws.
          cli: [asta generate-theories]
          input: [auto_discovery, audit]
          output: {theories: [theory], runs: [run]}
      - novelty_assessment:
          mission: First triage each theory for testability, recording the decision as a signal, by comparing its required data against the data in hand (the source dataset registered by auto_discovery plus any datasets evidence_gathering acquired). A theory is testable now only if its prediction is empirically free in that data, meaning a prediction that is definitionally entailed by how those variables were constructed, or that requires transient or time-resolved data, is not testable now even when the variables are present. For each testable theory, commit a prespecified proposed_test it could be checked against; theories needing new data are recorded untestable. Then score the novelty of the testable subset against the literature the Theorizer drew on, and list the testable theory ids.
          cli: [asta generate-theories]
          input: [theory_formation, auto_discovery, evidence_gathering]
          output: {theory_evaluations: [theory_evaluation], testable_theory_ids: [string], run: run}

  reproduction:
    mission: Ingest an AutoDiscovery run, group its experiments into laws, find independent data once for all of them, then reproduce each law. The verdict is two-axis, outcome crossed with testability, and comes from the branch's audit, not the ingested run.
    children:
      - auto_discovery:
          mission: Ingest the AutoDiscovery run and read off its candidate laws. If the mission names a provided run directory, import it and run no fresh discovery (skip `asta autodiscovery run`); otherwise run a fresh one (config n_experiments). Keep the raw experiment nodes as artifacts and register the run's own dataset(s) as a dataset entry, the "data in hand" that novelty_assessment later triages theories against; when data_provenance ran first, prefer the datasets it acquired (with their local paths), falling back to the run's described datasets where acquisition was restricted. Then group the run's experiments into candidate empirical laws — take every experiment flagged is_surprising, plus the config theorizer_top_n highest and theorizer_top_n lowest posterior_belief experiments (ranked by posterior_belief mean), deduped, and group them preserving the run's surprise ranking. For each law record the construct it claims, how the run measured it, and why these experiments form one law; keep each law to a single testable relationship, splitting a group that spans more than one distinct construct or claim. Also record each law's source_outcome, the run's own verdict on the law inferred from how its belief shifted during discovery. Laws are identity records; their reproduction verdicts come later, from each branch's audit.
          cli: [asta autodiscovery]
          output: {experiments: [ref(experiment)], datasets: [dataset], empirical_laws: [empirical_law], run: run}
      - evidence_gathering:
          mission: One search across all laws for independent datasets. Independent means a different instrument, inventory, region, or method than the source; prefer the lightest product that carries the needed variables. When a law is a difference or ratio of variables (e.g. ELA minus Zmin, or a normalized within-span position), keep every term of that construct on the SAME source and datum — swapping one term to an independent product with a different vertical datum, grid, or units silently corrupts the construct and manufactures false nulls. Vary one independence axis at a time and record which axis each dataset changes. Exhaust the openly available options — repositories, products the source cites, lighter per-entity or subset extracts, APIs, mirrors, and data reachable only through browser automation — before deciding a law cannot be tested; a dataset being large or awkward to obtain is never a reason to stop. Validate each acquired dataset against its source before registering it; one that fails validation is a gap, not an input. Register which laws each dataset can test, and for every law left uncovered record a gap with the avenues actually tried, reserving gaps for quantities that are genuinely non-public or have no independent measurement. Every law appears in a dataset's covers_laws or in gaps.
          cli: [asta literature, asta papers, asta documents, asta autodiscovery]
          input: [auto_discovery]
          output: {datasets: [dataset], gaps: [gap]}
      - replication:
          mission: One branch per law (created at replan, once auto_discovery has produced the law set). Reproduce that law on the independent data.
          replan: true
          children:
            - experiment_design:
                mission: State the original operationalization, the independent one, and whether they are equivalent or only a proxy. In the independent operationalization, hold the datum, grid, and units of every term of a difference or ratio construct consistent (do not mix, e.g., elevation or thickness sources within one derived quantity), and vary a single independence axis per test so that a non-reproduction is attributable to that axis rather than to a datum mismatch. Before committing, check whether the source law is an empirical relationship or an artifact of how the dataset was built, since a quantity defined from others is true by construction, a construct_mismatch to flag rather than a result to reproduce. Set feasibility from whether evidence_gathering found a secondary (independent) dataset that can test this law. No secondary dataset means feasibility data_unavailable and no DataVoyager run. Commit the prespecified test (test, metric, success_threshold) before any analysis runs. When an experiment-designer run informs the design, record its query in experiment_design_query and reference its full recipe_to_implement as an artifact (subtype experiment-design), and never inline it. What happens next is plan's Gate, not this step's job. Feasible and proxy_only branches get analysis and audit; data_unavailable and construct_mismatch branches get only audit, wired to this design alone, recording outcome n/a and testability untestable.
                cli: [asta experiment]
                input: [auto_discovery, evidence_gathering]
                output: {experiment_design: experiment_design, "run?": run}
            - analysis:
                mission: Run the reproduction on the acquired data, per the design's prespecified test. Using local tools to find, curate, validate, and reshape the data you send to DataVoyager is expected — merging products, deriving columns, fixing units, subsetting; what must NOT happen is running the reproduction test itself locally and reporting that as the result. The experiment is executed by DataVoyager and its computed output is the reproduction. Instruct DataVoyager to execute the analysis in its own code environment and return the actual computed numbers (effect size, p, n) plus at least one figure; a reply that only hands back code for you to run, asks you to run something, ends without computed values, or shuts down with no artifacts is not a result — resubmit with a more directive, imperative prompt (up to config dv_max_attempts) until DataVoyager returns computed results. A local computation may cross-check those numbers, but the reported effect size and outcome come from the DataVoyager run. Emit at least one figure behind the numbers. DataVoyager returns figures as imageb64, so decode each to a PNG under .asta/analyze-data/<slug>/figures/, put the path in figure.image (or render your own), and list them in `figures` with captions.
                cli: [asta analyze-data]
                input: [experiment_design, evidence_gathering]
                output: {analysis: analysis, figures: [ref(figure)], "run?": run}
            - audit:
                mission: Try to refute the analysis or find artifacts, then finalize the law's verdict. Beyond a negative control that reruns with the predictor shuffled (or equivalent) and confirms the effect disappears, probe sensitivity to influential observations and reasonable subset choices, and report when the verdict is sample-dependent rather than robust. Before finalizing a non-reproduction, rule out an analysis-setup artifact — confirm the independent operationalization preserved the construct's datum, grid, and units and varied only the intended independence axis, and re-test with source-matched auxiliary variables where a mismatch is possible; a null that appears only under a mismatched datum or a single confounded substitution is a setup artifact to fix and re-run, not a failed reproduction. Then finalize the law's two-axis verdict (outcome crossed with testability), independence axes, and observed effect size from the analysis, or from the experiment_design alone as outcome n/a and testability untestable when the branch was infeasible, checked against the design's prespecified success_threshold and judged by effect size rather than statistical significance alone on large samples. Also emit the reproduction signal (reward and basis), the signal the theorizer reads. When the law reproduces, give a positive reward with basis reproduced. When the effect does not replicate on the secondary data, give a negative reward with basis not_reproduced, and keep the law, since this is a negative signal not a removal. When you are confident the source finding is factually wrong (an AutoDS mistake), set reward -1 with basis refuted_incorrect, which drops it from the theorizer. When there is no secondary dataset and DataVoyager never ran, give no reward with basis not_evaluated. Record in source_agreement whether this independent verdict agrees with or contradicts the law's own source_outcome, flagging a contradiction prominently. Emit an audit_report referencing the law id. The law record itself is never re-emitted.
                cli: [asta analyze-data]
                input: [experiment_design, analysis]
                output: {audit_report: audit_report, "run?": run}

  data_and_literature_grounded_theory_generation:
    mission: Source the papers and data behind an existing AutoDiscovery run, reproduce as many of its findings as possible on independent data, then generate literature-grounded theories from the reproduced findings and triage each for testability. The aim is to maximize the number of findings independently checked and to ground and assess the theories they support.
    children:
      - data_provenance
      - reproduction
      - theorizer
      - summarize
      - reflection

  hypothesis_driven_research:
    mission: Answer a research question from mission.md by surveying the literature, forming explicit falsifiable hypotheses, and running one prespecified test per hypothesis on acquired data. Review, hypothesize, design, test, audit.
    children:
      - literature_review:
          mission: Survey the literature for the mission's question, covering what is known, what is contested, and which open gaps could be settled by an analysis on obtainable data. Emit key findings (with evidence uuids), the open gaps, and citations.
          cli: [asta literature, asta papers]
          output: {literature_review: literature_review}
      - hypothesis_formation:
          mission: Form a small set (typically 2-5) of falsifiable hypotheses from the review's open gaps, each a slim claim with its rationale, its falsifiable prediction, and the evidence it rests on. Prefer hypotheses testable on data the literature names. The theory machinery can help here, since a hypothesis is a slim theory committed to one prediction; seed its `paper_store` with identifier-only entries ({corpus_id}) from the literature_review citations, with search_additional_papers false when the corpus should be exactly those seeds.
          cli: [asta generate-theories]
          input: [literature_review]
          output: {hypotheses: [hypothesis], run: run}
      - testing:
          mission: One branch per hypothesis (created at replan, once hypothesis_formation has named them). Test that hypothesis end to end.
          replan: true
          children:
            - experiment_design:
                mission: Design the test (operationalization, required data, feasibility) and commit the prespecified test (test, metric, success_threshold) before any data is analyzed. When an experiment-designer run informs the design, record its query in experiment_design_query and reference its full recipe_to_implement as an artifact (subtype experiment-design), and never inline it. What happens next is plan's Gate, not this step's job. Feasible and proxy_only branches get data_acquisition (when the design names data not yet in hand), analysis, and audit; data_unavailable and construct_mismatch branches get only audit, wired to this design alone, recording outcome n/a.
                cli: [asta experiment]
                input: [hypothesis_formation, literature_review]
                output: {experiment_design: experiment_design, "run?": run}
            - data_acquisition:
                mission: Fetch the datasets the design requires. Validate each against its source (n, schema/variables, units, missingness) and record the check in validation_note; a dataset that fails validation is a gap, not an input.
                cli: [asta documents, asta autodiscovery]
                input: [experiment_design]
                output: {acquisitions: [acquisition], datasets: [dataset]}
            - analysis:
                mission: Run the prespecified test on the validated data. Effect size and outcome come from here. Emit at least one figure behind the numbers. DataVoyager returns figures as imageb64, so decode each to a PNG under .asta/analyze-data/<slug>/figures/, put the path in figure.image (or render your own), and list them in `figures` with captions.
                cli: [asta analyze-data]
                input: [experiment_design, data_acquisition]
                output: {analysis: analysis, figures: [ref(figure)], "run?": run}
            - audit:
                mission: Try to refute the analysis or find artifacts, then finalize the verdict. Beyond a negative control that reruns with the predictor shuffled (or equivalent) and confirms the effect disappears, probe sensitivity to influential observations and reasonable subset choices, and report when the verdict is sample-dependent rather than robust. Then finalize the hypothesis's outcome and observed effect size against the design's prespecified success_threshold, or from the experiment_design alone as outcome n/a when the branch was infeasible; on large samples judge by effect size, not statistical significance alone, and record a disproved hypothesis as cleanly as a supported one. Emit an audit_report referencing the hypothesis id.
                cli: [asta analyze-data]
                input: [experiment_design, analysis]
                output: {audit_report: audit_report, "run?": run}
      - summarize
      - reflection

  auto_discovery:
    mission: Source a cohort from the literature and run a fresh AutoDiscovery against a research question, then replicate each high-surprise candidate law on a held-out subset. Run as its own session in a separate workspace (own mission.md and .beads, since a second epic root in one workspace breaks epic-root.sh); the research question (the intent) comes from that mission.md. The intent and the cohort are the most important inputs to a good discovery run, so most of the work is front-loaded into cohort_assembly. This flow is distinct from `reproduction`, which imports an existing run rather than standing up a new one.
    children:
      - cohort_assembly:
          mission: Gather and cohort the data for discovery. Find the relevant papers, extract the numbers and the datasets they used, then source a cohort by fixing inclusion/exclusion and sampling, and hold an independent subset back for replication. Validate the assembled data against its source papers (n, schema/variables, units, missingness); a dataset that fails validation is a gap, not an input. Stand up and upload the discovery run (autodiscovery create, upload, metadata). Emit the cohort, with its discovery_subset, its held-out holdout_subset, and the stood-up run_id, alongside the registered datasets.
          cli: [asta literature, asta documents, asta generate-theories, asta autodiscovery]
          output: {cohort: cohort, datasets: [dataset], run: run}
      - discovery_run:
          mission: Run discovery against the original question with the cohort as data (config n_experiments, set in the run metadata). Fetch the experiments; the highest-surprise nodes are the candidate laws worth replicating. Emit those candidate laws (empirical_law identity records, grounded in the run's surprise signal) alongside the raw experiments. No separate law-grouping step; the high-surprise nodes are the laws.
          cli: [asta autodiscovery]
          input: [cohort_assembly]
          output: {experiments: [ref(experiment)], empirical_laws: [empirical_law], run: run}
      - replication:
          mission: One branch per high-surprise candidate law (created at replan, once discovery_run has named them). Replicate that law independently on the held-out subset.
          replan: true
          children:
            - holdout_replication:
                mission: Replicate the law on the held-out subset, one DataVoyager run per law, in parallel (at most config max_parallel_dv_runs concurrent submissions). Prepare and curate the held-out data with local tools as needed, but the replication experiment is executed by DataVoyager and its computed output is the result — do not run the test locally and report that as the replication. Instruct DataVoyager to execute the analysis in its own code environment and return the actual computed numbers and a figure; a reply that only returns code to run, asks you to run something, or ends without computed values is not a result — resubmit with a more directive prompt (up to config dv_max_attempts) until it returns computed results. The verdict comes from this replication, not from the discovery run, so emit an audit_report referencing the law id. Emit at least one figure behind the numbers. DataVoyager returns figures as imageb64, so decode each to a PNG under .asta/analyze-data/<slug>/figures/, put the path in figure.image (or render your own), and list them in `figures` with captions.
                cli: [asta analyze-data]
                input: [discovery_run, cohort_assembly]
                output: {audit_report: audit_report, figures: [ref(figure)], run: run}
      - summarize
      - reflection

config:
  n_experiments: 10                # auto-ds experiments per discovery run
  max_papers_to_retrieve: 100      # papers find-and-extract pulls from
  max_parallel_dv_runs: 5          # concurrent analyze-data submissions allowed at once
  theorizer_top_n: 10              # auto_discovery also grounds on the top and bottom N experiments by posterior belief
  dv_max_attempts: 3               # max DataVoyager resubmits when a run punts, errors, or returns no figure (the experiment result must come from DataVoyager, not a local run)

vocabulary:
  outcome:               [held, partial, failed, underpowered, n/a]
  testability:           [tested, proxy_only, untestable]
  construct_equivalence: [equivalent, proxy, mismatch]
  feasibility:           [feasible, proxy_only, data_unavailable, construct_mismatch]
  independence_axis:     [region, instrument, method, construct, temporal, population]
  generation_objective:  [accuracy_focused, novelty_focused]
  subject_kind:          [empirical_law, theory, hypothesis]
  novelty:               [established, derivable, genuinely_new]
  support_level:         [supports, mixed, contradicts, inconclusive]
  access_status:         [acquired, open_unfetched, restricted, not_found]
  signal_basis:          [reproduced, not_reproduced, refuted_incorrect, not_evaluated, testable, untestable]
  source_outcome:        [supported, rejected, mixed, unclear]
  source_agreement:      [agrees, discordant, not_applicable]
  gap_kind:              [not_public, model_output, definitional, transient_needed]
  friction_kind:         [flow, schema, tool, mission, data]
  severity:              [high, medium, low]
  cite_kind:             [autodiscovery_run, theorizer_artifact, datavoyager_run]

outputs:

  run:                             # a producing run/artifact; carries the wiki's deep links
    kind: cite_kind
    run_id: string
    share_url?: string
    agent?: string
    a2a_task_id?: string
    a2a_context_id?: string

  figure:
    caption: string
    image: string

  experiment:  # an auto-ds experiment node; paste the full record, extras preserved
    experiment_id: string
    status: string
    hypothesis: string
    analysis: string

  empirical_law:
    id: string
    statement: string
    construct: string
    source_operationalization: string
    source_node: string
    effect_size_source: string
    grouping_rationale: string
    source_outcome: source_outcome
    mcts_provenance?: {surprise: number, is_surprising: boolean, prior_belief: object, posterior_belief: object}   # the auto-ds search-signal fields, verbatim

  dataset:
    id: string
    definition: string
    source: string
    n: number
    sampling: string
    variables: [string]
    covers_laws: [string]

  gap:
    law_id: string
    avenues_tried: [string]
    gap_kind: gap_kind
    explanation: string

  data_source:
    id: string
    dataset_id: string
    paper_id: string
    paper_title: string
    paper_url: string

  source_access:
    data_source_id: string
    data_availability: string
    sources: [source_ref]

  source_ref:
    repository: string
    identifier: string

  acquisition:
    data_source_id: string
    access_status: access_status
    local_path: string
    dataset_id: string
    validation_note: string

  cohort:
    id: string
    research_question: string
    inclusion_criteria: string
    exclusion_criteria: string
    sampling: string
    source_data_sources: [string]
    discovery_subset: {definition: string, n: number, path: string}
    holdout_subset: {definition: string, n: number, path: string}
    run_id: string

  experiment_design:
    subject_kind: subject_kind
    subject_id: string
    experiment_name: string
    plain_language_description: string
    source_operationalization: string
    independent_operationalization: string
    construct_equivalence: construct_equivalence
    feasibility: feasibility
    required_data: string
    data_gap: string
    experiment_design_query: string
    prespecified:
      test: string
      metric: string
      success_threshold: string

  analysis:
    final_answer: string
    assumptions: string
    code: string

  audit_report:                      # the refutation work plus the finalized verdict (formerly a separate critique)
    subject_kind: subject_kind
    subject_id: string
    challenges: [{concern: string, check: string, outcome: string}]
    artifacts_found: [string]
    verdict_survives: boolean
    recommended_adjustment: string
    outcome: outcome
    testability: testability
    source_agreement: source_agreement
    effect_size_observed: string
    prespecified_check: string
    independence_axes: [independence_axis]
    data_used: string
    evidence: string
    signal?: signal

  signal:                            # a reward/basis signal; reproduction (audit) or testability (triage)
    reward?: number   # [-1, +1]; omit when not applicable
    basis: signal_basis

  extracted_data:
    id: string
    run_id: string
    paper_id: string
    extraction_schema_id: string
    rows:
      - name_short: string
        name_full: string
        brief_description: string
        citation_title: string
        uuid: string

  citation:
    id: string
    corpus_id: number
    title: string
    url: string
    relevance: string

  literature_review:
    summary: string
    key_findings: [{text: string, uuids: [string]}]
    open_gaps: [string]
    citations: [citation]

  hypothesis:
    id: string
    statement: string
    rationale: string
    falsifiable_prediction: string
    grounds: [{text: string, uuids: [string]}]

  theory:
    id: string
    name: string
    description: string
    theory_query: string
    objective: generation_objective  # orchestrator annotation; the agent's own copy lives in theory_components
    grounds_law_ids: [string]
    supporting_evidence_ids: [string]
    components_path: ref(theory_components)

  theory_components:  # the theorizer's record, carried verbatim; never flatten or edit
    generation_objective: string
    theory_statements:
      - statement_name: string
        theory_statement: string
        supporting_evidence: [{text: string, uuids: [string]}]
        conflicting_evidence: [{text: string, uuids: [string]}]
    new_predictions_likely: [string]
    new_predictions_unknown: [string]
    unaccounted_for: [{text: string, uuids: [string]}]

  theory_evaluation:                 # novelty score plus the testability triage (formerly a separate testability_triage)
    id: string
    theory_id: string
    signal: signal   # the testability decision; basis testable or untestable
    available_data: string
    required_data: string
    proposed_test: {test: string, metric: string, success_threshold: string}   # prespecified; how the theory could be checked on the data in hand
    gap: string
    novelty: novelty
    overall_support: support_level
    overall_support_raw?: string
    explanation: string
    statement_evaluations:
      - statement_index: number
        novelty: novelty
        explanation: string

  citation_ref:
    kind: cite_kind
    ref: string
    label?: string

  statement:
    text: string
    citations?: [citation_ref]   # omit for basic background knowledge

  paragraph:
    sentences: [statement]

  summary:
    title: string
    discipline: string
    domain: string
    topic: string
    scientific_question: string
    discovery_type: string   # open vocabulary; e.g. Predictive law, Mechanistic explanation, Negative result
    context: [paragraph]
    summaries: [audience_summary]

  audience_summary:
    audience: string
    main_finding: statement
    elaboration: [statement]

  reflection:
    session_intent: string
    frictions:
      - where: string
        kind: friction_kind
        observation: string
        severity: severity
    proposed_changes:
      - target: string
        change: string
        rationale: string
        severity: severity
