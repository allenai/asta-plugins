version: 2

workflows:

  summarize:
    mission: Summarize a completed research session as a self-contained encyclopedia entry. It composes onto any flow, reads the whole session, and names no inputs, so it runs last by id order.
    children:
      - summarize:
          mission: From the completed session's report, write a stand-alone encyclopedia entry a reader can understand without the original report. Give it a short, informative title and the index fields that place it in the encyclopedia. Write a context passage that orients the reader to the technical domain, setting the scientific context only, and do not repeat the research or the discovery. Then write an executive summary for each audience that states the finding succinctly and elaborates in a paragraph highlighting what is most novel or surprising versus what is already known. Write one for an intelligent layperson outside the field (simplify, avoid jargon) and one for a scientist working in the field, each standing on its own. Write the context, main finding, and elaboration as statements. When a statement rests on an AutoDiscovery run, a Theorizer artifact, or a DataVoyager run from this session, cite it by that run or artifact's own id copied from the session; never invent an id or cite one you cannot find in the session, and leave basic background knowledge uncited. Author output_json only; compile-report.py renders the cover, the deep-link header, and the body.
          output: {summary: summary}

  reflection:
    mission: Capture the executing agent's feedback on how the session ran. It composes onto any flow, reads the whole session, and names no inputs, so it runs last by id order.
    children:
      - reflection:
          mission: The session is finished. Look back over the run and record how it went, as feedback rather than science. Note where the flow, schema, or tools got in your way or cost you rework, and the concrete changes that would have made the run go better. Point at the real tasks, fields, and tools involved.
          output: {reflection: reflection}

  theorizer:
    mission: Explain the cross-cutting theories behind the reproduced hypotheses — anchored to the run's own stated intent and dataset context, grounded in the literature and the reproduction's numbers — by fanning out one Theorizer run per generation objective, then triaging the theories for testability. Novelty is read from the Theorizer's own per-statement novelty_evaluation, not scored separately at the theory level.
    children:
      - theory_formation:
          mission: >-
            Fan out one branch per generation objective — accuracy_focused and novelty_focused — so
            each objective is its own Theorizer run (n = 2 branches).
          replan: objective
          children:
            - theory_generation:
                mission: >-
                  Run the managed Theorizer once for THIS branch's generation objective. Reconstruct
                  the original user's intent from the run's metadata — its stated intent and dataset
                  descriptions — and distil it into the query and framing, so the theories serve what
                  the user set out to learn. On the reproduced hypotheses, generate theories under this
                  objective (accuracy_focused: grounded in established results; novelty_focused:
                  non-obvious mechanisms and new predictions), each tagged with the objective, all
                  relevant to the user's intent and cross-cutting (each explaining several reproduced
                  hypotheses), grounded in both the literature and the reproduction's effect sizes and
                  verdicts. Preserve each theory's per-statement novelty_evaluation verbatim in its
                  theory_components — that statement-level novelty is what the report surfaces. Drop any
                  hypothesis the audit confirmed as a mistake; keep a hypothesis that did not reproduce
                  but carry its negative signal as conflicting evidence. Populate conflicting_evidence,
                  and make unaccounted_for address the partial and untestable hypotheses.
                cli: [asta generate-theories]
                input: [auto_discovery, audit, literature_search]
                output: {theories: [theory], run: run}
      - novelty_assessment:
          mission: Triage each theory for testability, recording the decision as a signal, by comparing its required data against the independent data in hand (whatever evidence_gathering provided or found). A theory is testable now only if its prediction is empirically free in that data; a prediction that is definitionally entailed by how those variables were constructed, or that requires transient or time-resolved data, is not testable now even when the variables are present. For each testable theory, commit a prespecified proposed_test it could be checked against; theories needing new data are recorded untestable. Novelty is not re-scored here at the theory level — carry the Theorizer's per-statement novelty_evaluation through — and list the testable theory ids.
          cli: [asta generate-theories]
          input: [theory_generation, auto_discovery, evidence_gathering]
          output: {theory_evaluations: [theory_evaluation], testable_theory_ids: [string], run: run}

  data_and_literature_grounded_theory_generation:
    mission: Reproduce an existing AutoDiscovery run's hypotheses on independent data, then generate literature-grounded theories from them. First obtain the run's experiments (auto_discovery); then, in parallel, gather the independent secondary data (evidence_gathering — provided in the mission or found by an open search) and run the thematic + intent literature searches (literature_search); fan back in and reproduce each selected hypothesis on the secondary data (reproduction branches); then theorize, summarize, and reflect. There is no data_provenance step and no recovery of the run's original dataset — only independent data matters.
    children:
      - auto_discovery:
          mission: >-
            Execute AutoDiscovery, or — when the mission already provides a run directory — just load
            its experiment log (the mcts_node_*.json nodes) and run no fresh discovery. This step only
            obtains the experiments and makes a signal-based selection; it adds no scientific judgment.
            SELECT the candidate hypotheses ONE-TO-ONE from the log — no grouping, clustering, merging,
            splitting, or rewording: take every experiment whose `surprising` field is true, plus the
            config theorizer_top_n experiments with the highest `posterior.mean` and the theorizer_top_n
            with the lowest, deduplicated by node id. Each selected experiment becomes exactly one
            candidate hypothesis: copy its `hypothesis` field VERBATIM as the statement (never reword —
            a single changed word can invalidate it) and carry its `experiment_plan`, `code`, and run
            signals (`surprising`, `posterior.mean`, `belief_change`, `normalized_surprisal`) unchanged,
            so experiment_design can hand the same experiment to DataVoyager. Record each one's
            source_outcome from how its belief shifted (posterior.mean vs prior.mean). Keep the raw
            experiment nodes as artifacts.
          cli: [asta autodiscovery]
          output: {experiments: [ref(experiment)], autods_hypotheses: [autods_hypothesis], run: run}
      - literature_search:
          mission: >-
            Ground the theories in the literature, in parallel with evidence_gathering. Cluster the
            AutoDiscovery hypotheses into up to config n_thematic_searches themes and add one further
            theme that is the run's overall intent (from the run metadata); this phase fans out one
            branch per theme.
          replan: theme
          children:
            - thematic_search:
                mission: >-
                  Search the literature for this one theme (a cluster of AutoDiscovery hypotheses, or
                  the run's overall intent). Retrieve papers with the `asta-papers` PyPI package and,
                  with the user's consent, computer-use for papers behind access friction. Emit a
                  literature_review for the theme: key findings with evidence uuids, open gaps, and
                  citations.
                cli: [asta literature, asta papers]
                input: [auto_discovery]
                output: {literature_review: literature_review}
      - evidence_gathering:
          mission: >-
            Get the independent (secondary) data the hypotheses are reproduced on. If the mission
            provides or names a secondary dataset (a folder, product, or link), register that as the
            independent data and do not search further — the original AutoDiscovery dataset is not
            needed. Otherwise run ONE open-ended search across all hypotheses for independent datasets:
            independent means a different instrument, inventory, region, or method than the source;
            prefer the lightest product that carries the needed variables. When a hypothesis is a
            difference or ratio of variables,
            keep every term of that construct on the SAME source and datum — swapping one term to an
            independent product with a different vertical datum, grid, or units silently corrupts the
            construct and manufactures false nulls. Vary one independence axis at a time and record which
            axis each dataset changes. Exhaust the openly available options — repositories, products the
            source cites, lighter per-entity or subset extracts, APIs, mirrors, and data reachable only
            through browser automation — before deciding a hypothesis cannot be tested; a dataset being
            large or awkward to obtain is never a reason to stop. Validate each acquired dataset against
            its source before registering it; one that fails validation is a gap, not an input. Register
            which hypotheses each dataset can test (covers_hypotheses), and for every hypothesis left
            uncovered record a gap with the avenues actually tried, reserving gaps for quantities that
            are genuinely non-public or have no independent measurement. Every hypothesis appears in a
            dataset's covers_hypotheses or in gaps.
          cli: [asta literature, asta papers, asta documents, asta autodiscovery]
          input: [auto_discovery]
          output: {datasets: [dataset], gaps: [gap]}
      - reproduction:
          mission: One branch per selected hypothesis (created at replan, once auto_discovery has selected the hypothesis set). Reproduce that hypothesis on the independent data; the two-axis verdict (outcome crossed with testability) comes from the branch's audit, not the ingested run.
          replan: hypothesis
          children:
            - experiment_design:
                mission: >-
                  Adapt the AutoDiscovery experiment for the independent data — do not design a new one.
                  Start from the hypothesis's carried AutoDS record (its verbatim `hypothesis`,
                  `experiment_plan`, and `code`) and re-express the SAME test on the secondary dataset,
                  changing only what the new data requires (column names, units, the load step); keep the
                  statistic, the direction, and the decision the same as the AutoDS inner loop so autods
                  and DataVoyager stay identical. State the original operationalization, the independent
                  one, and whether they are equivalent or only a proxy. Hold the datum, grid, and units of
                  every term of a difference or ratio construct consistent (do not mix elevation or
                  thickness sources within one derived quantity), and vary a single independence axis per
                  test so a non-reproduction is attributable to that axis rather than to a datum mismatch.
                  Before committing, check whether the source hypothesis is an empirical relationship or an
                  artifact of how the dataset was built, since a quantity defined from others is true by
                  construction — a construct_mismatch to flag rather than a result to reproduce. Set
                  feasibility from whether evidence_gathering has a secondary dataset that can test this
                  hypothesis; no secondary dataset means feasibility data_unavailable and no DataVoyager
                  run. Commit the prespecified test (test, metric, success_threshold) before any analysis
                  runs. What happens next is plan's Gate, not this step's job. Feasible and proxy_only
                  branches get analysis and audit; data_unavailable and construct_mismatch branches get
                  only audit, wired to this design alone, recording outcome n/a and testability untestable.
                cli: [asta experiment]
                input: [auto_discovery, evidence_gathering, literature_search]
                output: {experiment_design: experiment_design, "run?": run}
            - analysis:
                mission: Run the reproduction on the acquired data, per the design's prespecified test. Using local tools to find, curate, validate, and reshape the data you send to DataVoyager is expected — merging products, deriving columns, fixing units, subsetting; what must NOT happen is running the reproduction test itself locally and reporting that as the result. The experiment is executed by DataVoyager and its computed output is the reproduction. Instruct DataVoyager to execute the analysis in its own code environment and return the actual computed numbers (effect size, p, n) plus at least one figure; a reply that only hands back code for you to run, asks you to run something, ends without computed values, or shuts down with no artifacts is not a result — resubmit with a more directive, imperative prompt (up to config dv_max_attempts) until DataVoyager returns computed results. A local computation may cross-check those numbers, but the reported effect size and outcome come from the DataVoyager run. Emit at least one figure behind the numbers. DataVoyager returns figures as imageb64, so decode each to a PNG under .asta/analyze-data/<slug>/figures/, put the path in figure.image (or render your own), and list them in `figures` with captions.
                cli: [asta analyze-data]
                input: [experiment_design, evidence_gathering]
                output: {analysis: analysis, figures: [ref(figure)], "run?": run}
            - audit:
                mission: Try to refute the analysis or find artifacts, then finalize the hypothesis's verdict. Beyond a negative control that reruns with the predictor shuffled (or equivalent) and confirms the effect disappears, probe sensitivity to influential observations and reasonable subset choices, and report when the verdict is sample-dependent rather than robust. Before finalizing a non-reproduction, rule out an analysis-setup artifact — confirm the independent operationalization preserved the construct's datum, grid, and units and varied only the intended independence axis, and re-test with source-matched auxiliary variables where a mismatch is possible; a null that appears only under a mismatched datum or a single confounded substitution is a setup artifact to fix and re-run, not a failed reproduction. Then finalize the hypothesis's two-axis verdict (outcome crossed with testability), independence axes, and observed effect size from the analysis, or from the experiment_design alone as outcome n/a and testability untestable when the branch was infeasible, checked against the design's prespecified success_threshold and judged by effect size rather than statistical significance alone on large samples. Also emit the reproduction signal (reward and basis), the signal the theorizer reads. When the hypothesis reproduces, give a positive reward with basis reproduced. When the effect does not replicate on the secondary data, give a negative reward with basis not_reproduced, and keep the hypothesis, since this is a negative signal not a removal. When you are confident the source finding is factually wrong (an AutoDS mistake), set reward -1 with basis refuted_incorrect, which drops it from the theorizer. When there is no secondary dataset and DataVoyager never ran, give no reward with basis not_evaluated. Record in source_agreement whether this independent verdict agrees with or contradicts the hypothesis's own source_outcome, flagging a contradiction prominently, and echo the hypothesis's source_outcome into run_finding. Most importantly set reproduction_verdict, the reader-facing SIGNIFICANCE-based verdict on the hypothesis, judged strictly by statistical significance and power, NEVER by point-estimate direction alone. The values are supported (a prespecified test reached significance in the hypothesised direction), supported_partial (at least one prespecified component did), opposite_effect (a significant effect in the OPPOSITE direction), rejected (adequately powered but no significant effect), inconclusive (too few events or samples to decide, so a favorable HR or correlation that did not reach p<0.05 is inconclusive rather than support), or not_tested (no feasible independent test). Emit an audit_report referencing the hypothesis id. The hypothesis record itself is never re-emitted.
                cli: [asta analyze-data]
                input: [experiment_design, analysis]
                output: {audit_report: audit_report, "run?": run}
      - theorizer
      - summarize
      - reflection

  auto_discovery:
    mission: Source a cohort from the literature and run a fresh AutoDiscovery against a research question, then replicate each surprising candidate hypothesis on a held-out subset. Run as its own session in a separate workspace (own mission.md and .beads, since a second epic root in one workspace breaks epic-root.sh); the research question (the intent) comes from that mission.md. The intent and the cohort are the most important inputs to a good discovery run, so most of the work is front-loaded into cohort_assembly. This flow is distinct from `reproduction`, which imports an existing run rather than standing up a new one.
    children:
      - cohort_assembly:
          mission: Gather and cohort the data for discovery. Find the relevant papers, extract the numbers and the datasets they used, then source a cohort by fixing inclusion/exclusion and sampling, and hold an independent subset back for replication. Validate the assembled data against its source papers (n, schema/variables, units, missingness); a dataset that fails validation is a gap, not an input. Stand up and upload the discovery run (autodiscovery create, upload, metadata). Emit the cohort, with its discovery_subset, its held-out holdout_subset, and the stood-up run_id, alongside the registered datasets.
          cli: [asta literature, asta documents, asta generate-theories, asta autodiscovery]
          output: {cohort: cohort, datasets: [dataset], run: run}
      - discovery_run:
          mission: Run discovery against the original question with the cohort as data (config n_experiments, set in the run metadata). Fetch the experiments; select the candidate hypotheses one-to-one from the log — every experiment whose `surprising` field is true — and emit them as autods_hypothesis identity records with the `hypothesis` field copied VERBATIM and the `experiment_plan`, `code`, and run signals (`surprising`, `posterior.mean`, `belief_change`, `normalized_surprisal`, and `creation_idx` minus 1 as `experiment_index` — the run UI's 0-indexed `?exp=N`) carried unchanged, alongside the raw experiments. No grouping, merging, or rewording; the surprising nodes are the hypotheses, one per node.
          cli: [asta autodiscovery]
          input: [cohort_assembly]
          output: {experiments: [ref(experiment)], autods_hypotheses: [autods_hypothesis], run: run}
      - replication:
          mission: One branch per candidate hypothesis (created at replan, once discovery_run has named them). Replicate that hypothesis independently on the held-out subset.
          replan: hypothesis
          children:
            - holdout_replication:
                mission: Replicate the hypothesis on the held-out subset, one DataVoyager run per hypothesis, in parallel (at most config max_parallel_dv_runs concurrent submissions). Prepare and curate the held-out data with local tools as needed, but the replication experiment is executed by DataVoyager and its computed output is the result — do not run the test locally and report that as the replication. Instruct DataVoyager to execute the analysis in its own code environment and return the actual computed numbers and a figure; a reply that only returns code to run, asks you to run something, or ends without computed values is not a result — resubmit with a more directive prompt (up to config dv_max_attempts) until it returns computed results. The verdict comes from this replication, not from the discovery run, so emit an audit_report referencing the hypothesis id. Emit at least one figure behind the numbers. DataVoyager returns figures as imageb64, so decode each to a PNG under .asta/analyze-data/<slug>/figures/, put the path in figure.image (or render your own), and list them in `figures` with captions.
                cli: [asta analyze-data]
                input: [discovery_run, cohort_assembly]
                output: {audit_report: audit_report, figures: [ref(figure)], run: run}
      - summarize
      - reflection

config:
  n_experiments: 10                # auto-ds experiments per discovery run
  max_papers_to_retrieve: 100      # papers find-and-extract pulls from
  max_parallel_dv_runs: 5          # concurrent analyze-data submissions allowed at once
  theorizer_top_n: 10              # auto_discovery also grounds on the top and bottom N experiments by posterior belief
  n_thematic_searches: 5           # literature_search fans out this many hypothesis-clustered themes (+1 run-intent theme)
  dv_max_attempts: 3               # max DataVoyager resubmits when a run punts, errors, or returns no figure

vocabulary:
  outcome:               [held, partial, failed, underpowered, n/a]
  testability:           [tested, proxy_only, untestable]
  construct_equivalence: [equivalent, proxy, mismatch]
  feasibility:           [feasible, proxy_only, data_unavailable, construct_mismatch]
  independence_axis:     [region, instrument, method, construct, temporal, population]
  generation_objective:  [accuracy_focused, novelty_focused]
  subject_kind:          [autods_hypothesis, theory]
  novelty:               [established, derivable, genuinely_new]
  theorizer_novelty:     [new, somewhat-related-to-existing, closely-related-to-existing, not_evaluated]  # Theorizer's native per-statement class; not_evaluated when it scored none
  support_level:         [supports, mixed, contradicts, inconclusive]
  access_status:         [acquired, open_unfetched, restricted, not_found]
  signal_basis:          [reproduced, not_reproduced, refuted_incorrect, not_evaluated, testable, untestable]
  source_outcome:        [supported, rejected, mixed, unclear]
  source_agreement:      [agrees, discordant, not_applicable]
  # reader-facing reproduction verdict, SIGNIFICANCE-based (not direction-based). supported = a
  # prespecified test reached significance in the hypothesised direction; supported_partial = at
  # least one component did; opposite_effect = a significant effect in the OPPOSITE direction;
  # rejected = adequately powered but no significant effect; inconclusive = too few events/samples
  # to decide (a favorable point estimate that did not reach significance is inconclusive, NOT
  # support); not_tested = no feasible independent test.
  reproduction_verdict:  [supported, supported_partial, opposite_effect, rejected, inconclusive, not_tested]
  gap_kind:              [not_public, model_output, definitional, transient_needed]
  friction_kind:         [flow, schema, tool, mission, data]
  severity:              [high, medium, low]
  cite_kind:             [autodiscovery_run, theorizer_artifact, datavoyager_run]

outputs:

  run:                             # a producing run/artifact; carries the wiki's deep links
    kind: cite_kind
    run_id: string
    share_url?: string
    agent?: string
    a2a_task_id?: string
    a2a_context_id?: string

  figure:
    caption: string
    image: string

  experiment:  # an auto-ds experiment node (mcts_node_*.json); paste the full record, extras preserved
    experiment_id: string
    status: string
    hypothesis: string
    experiment_plan: {objective: string, steps: string, deliverables: string}
    code: string
    code_output: string
    analysis: string
    surprising: boolean
    posterior_mean: number       # posterior.mean from the node
    belief_change: number
    normalized_surprisal: number

  autods_hypothesis:  # one AutoDiscovery experiment node, selected 1:1; hypothesis text is verbatim
    id: string
    statement: string            # the node's `hypothesis`, copied VERBATIM (never reworded)
    source_node: string          # the mcts node id
    experiment_plan: {objective: string, steps: string, deliverables: string}   # from the log, verbatim; steps may be a repo-root-relative .txt path-ref when the full text would exceed the metadata cap
    code: string                 # the node's code, verbatim (what experiment_design adapts for DV)
    effect_size_source: string   # the source effect from the node's analysis (verbatim, untruncated); may be a repo-root-relative .txt path-ref when the full text would exceed the metadata cap
    source_outcome: source_outcome
    mcts_provenance?: {surprising: boolean, posterior_mean: number, prior_mean: number, belief_change: number, normalized_surprisal: number, experiment_index: number}   # the auto-ds search-signal fields, verbatim; experiment_index is the run UI's ?exp=N (0-indexed = the node's creation_idx minus 1)

  dataset:
    id: string
    definition: string
    source: string
    n: number
    sampling: string
    variables: [string]
    covers_hypotheses: [string]

  gap:
    hypothesis_id: string
    avenues_tried: [string]
    gap_kind: gap_kind
    explanation: string

  cohort:
    id: string
    research_question: string
    inclusion_criteria: string
    exclusion_criteria: string
    sampling: string
    source_data_sources: [string]
    discovery_subset: {definition: string, n: number, path: string}
    holdout_subset: {definition: string, n: number, path: string}
    run_id: string

  experiment_design:   # the AutoDS experiment re-expressed for the independent data (autods innerloop == DV)
    subject_kind: subject_kind
    subject_id: string
    experiment_name: string
    source_hypothesis: string          # the AutoDS `hypothesis`, verbatim (carried from autods_hypothesis)
    source_experiment_plan: {objective: string, steps: string, deliverables: string}   # from the log
    source_code: string                # the AutoDS node code being adapted
    plain_language_description: string
    source_operationalization: string
    independent_operationalization: string   # the same test, adapted to the secondary data's columns/units
    construct_equivalence: construct_equivalence
    feasibility: feasibility
    required_data: string
    data_gap: string
    experiment_design_query: string
    prespecified:
      test: string
      metric: string
      success_threshold: string

  analysis:
    final_answer: string
    assumptions: string
    code: string

  audit_report:                      # the refutation work plus the finalized verdict (formerly a separate critique)
    subject_kind: subject_kind
    subject_id: string
    challenges: [{concern: string, check: string, outcome: string}]
    artifacts_found: [string]
    verdict_survives: boolean
    recommended_adjustment: string
    outcome: outcome
    testability: testability
    source_agreement: source_agreement
    reproduction_verdict: reproduction_verdict   # reader-facing, SIGNIFICANCE-based verdict on the hypothesis
    run_finding: source_outcome            # the run's own verdict, echoed for a direct before/after read
    effect_size_observed: string
    prespecified_check: string
    independence_axes: [independence_axis]
    data_used: string
    evidence: string
    signal?: signal

  signal:                            # a reward/basis signal; reproduction (audit) or testability (triage)
    reward?: number   # [-1, +1]; omit when not applicable
    basis: signal_basis

  citation:
    id: string
    corpus_id: number
    title: string
    url: string
    relevance: string

  literature_review:
    theme: string                                    # the search theme this review covers; the report groups the bibliography by it
    summary: string
    key_findings: [{text: string, uuids: [string]}]
    open_gaps: [string]
    citations: [citation]

  theory:
    id: string
    name: string
    description: string
    theory_query: string
    objective: generation_objective  # orchestrator annotation; the agent's own copy lives in theory_components
    grounds_hypothesis_ids: [string]
    supporting_evidence_ids: [string]
    components_path: ref(theory_components)

  theory_components:  # the theorizer's record, carried verbatim; never flatten or edit
    generation_objective: string
    theory_statements:
      - statement_name: string
        theory_statement: string
        novelty_evaluation: {likely_classification: theorizer_novelty, "what_is_novel?": string}   # REQUIRED: carry the Theorizer's per-statement novelty verbatim (not_evaluated when it scored none); the report's theory table surfaces this
        supporting_evidence: [{text: string, uuids: [string]}]
        conflicting_evidence: [{text: string, uuids: [string]}]
    new_predictions_likely: [string]
    new_predictions_unknown: [string]
    unaccounted_for: [{text: string, uuids: [string]}]

  theory_evaluation:                 # novelty score plus the testability triage (formerly a separate testability_triage)
    id: string
    theory_id: string
    signal: signal   # the testability decision; basis testable or untestable
    available_data: string
    required_data: string
    proposed_test: {test: string, metric: string, success_threshold: string}   # prespecified; how the theory could be checked on the data in hand
    gap: string
    novelty: novelty
    overall_support: support_level
    overall_support_raw?: string
    explanation: string
    statement_evaluations:
      - statement_index: number
        novelty: novelty
        explanation: string

  citation_ref:
    kind: cite_kind
    ref: string
    label?: string

  statement:
    text: string
    citations?: [citation_ref]   # omit for basic background knowledge

  paragraph:
    sentences: [statement]

  summary:
    title: string
    discipline: string
    domain: string
    topic: string
    scientific_question: string
    discovery_type: string   # open vocabulary; e.g. Predictive law, Mechanistic explanation, Negative result
    context: [paragraph]
    summaries: [audience_summary]

  audience_summary:
    audience: string
    main_finding: statement
    elaboration: [statement]

  reflection:
    session_intent: string
    frictions:
      - where: string
        kind: friction_kind
        observation: string
        severity: severity
    proposed_changes:
      - target: string
        change: string
        rationale: string
        severity: severity
