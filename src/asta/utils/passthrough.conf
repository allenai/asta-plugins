# Passthrough command configurations
# Update minimum_version here to require newer releases
# Format: x.y.z semantic version (e.g., "0.1.0", "1.2.3")
# Tools with version >= minimum_version will be accepted
#
# Installation source types:
#   pypi:  Install from PyPI (e.g., "package-name")
#   git:   Install from Git repository (e.g., "git+https://github.com/user/repo")
#   local: Install from local filesystem (e.g., "/path/to/package" or "~/dev/package")

passthrough {
  documents {
    tool_name = "asta-documents"
    install_type = "pypi"
    install_source = "asta-resource-repository"
    minimum_version = "0.3.0"
    command_name = "documents"
    friendly_name = "asta-documents"
    docstring = "Manage a local library of documents known to Asta"
  }

  experiment {
    tool_name = "panda"
    install_type = "git"
    install_source = "git+https://github.com/allenai/panda"
    minimum_version = "1.5.2"
    command_name = "experiment"
    friendly_name = "panda"
    docstring = "Run computational experiments"
  }
}
