# Asta CLI Configuration
# This is the central configuration file for the Asta CLI.
#
# You can specify a custom location using the ASTA_CONFIG_FILE environment variable:
#   export ASTA_CONFIG_FILE=/path/to/your/asta.conf
#
# Format: HOCON (Human-Optimized Config Object Notation)
# Documentation: https://github.com/chimpler/pyhocon

# Auth0 configuration
auth {
  auth0_domain = "auth0.allenai.org"
  # Public UUID
  auth0_client_id = "NkhOb7B3oTpajykCAD1rjI2ZHAKV8Q3B"
  # Corresponds to the "Asta Gateway" API in Auth0
  auth0_audience = "https://asta-apis.allenai.org/api"

  # Actual proxy URL for Asta services
  # (Override via ASTA_GATEWAY_URL)
  gateway_url = "https://asta-gateway.apps.allenai.org"
  gateway_url = ${?ASTA_GATEWAY_URL}
}

# API endpoint configurations
# Base URLs for external APIs used by asta clients
apis {
  # Semantic Scholar API for paper metadata
  semantic_scholar {
    base_url = ${auth.gateway_url}"/api/semantic-scholar"
  }

  # Asta Paper Finder API
  paper_finder {
    base_url = ${auth.gateway_url}"/api/paper-finder"
    # A2A (Agent-to-Agent) endpoint host for `asta literature interactive`.
    # Override via ASTA_PAPER_FINDER_A2A_URL or the --server flag.
    a2a_url = ${auth.gateway_url}"/api/paper-finder"
    a2a_url = ${?ASTA_PAPER_FINDER_A2A_URL}
  }

  # OlmOCR API for PDF text extraction
  olmocr {
    base_url = ${auth.gateway_url}"/api/olmocr"
    model = "allenai/olmocr-2-7b-1025"
  }

  # Remote OCR API for PDF text extraction
  remote-ocr {
    base_url = ${auth.gateway_url}"/api/remote-ocr"
  }

  # Theorizer agent for theory generation
  theorizer {
    base_url = ${auth.gateway_url}"/api/theorizer"
  }
  
  # AutoDiscovery API for runs and experiments
  autodiscovery {
    base_url = ${auth.gateway_url}"/api/autodiscovery"
  }

  # DataVoyager A2A agent + dataset upload endpoint
  analyze_data {
    base_url = ${auth.gateway_url}"/api/analyze-data"
    base_url = ${?ASTA_ANALYZE_DATA_URL}
  }

  # Auto Experiment Designer A2A agent
  auto-exp-designer {
    base_url = ${auth.gateway_url}"/api/auto-exp-designer"
  }
}

# Passthrough command configurations
# Commands that delegate to external tools, auto-installed on first use.
#
# Update minimum_version here to require newer releases
# Format: x.y.z semantic version (e.g., "0.1.0", "1.2.3")
# Tools with version >= minimum_version will be accepted
#
# Installation source types:
#   pypi:  Install from PyPI (e.g., "package-name")
#   git:   Install from Git repository (e.g., "git+https://github.com/user/repo")
#   local: Install from local filesystem (e.g., "/path/to/package" or "~/dev/package")

passthrough {
  documents {
    tool_name = "asta-documents"
    install_type = "pypi"
    install_source = "asta-resource-repository"
    minimum_version = "0.3.1"
    command_name = "documents"
    docstring = "Manage a local library of documents known to Asta"
  }

  experiment {
    tool_name = "panda"
    install_type = "git"
    install_source = "git+https://github.com/allenai/panda"
    minimum_version = "1.5.2"
    command_name = "experiment"
    docstring = "Run computational experiments"
  }

  pdf-extraction {
    tool_name = "olmocr"
    install_type = "pypi"
    install_source = "olmocr"
    minimum_version = "0.4.27"
    command_name = "pdf-extraction"
    docstring = "Extract text from PDFs using olmOCR"
  }

  flows {
    tool_name = "asta-flows"
    install_type = "local"
    install_source = "~/workspace/asta-flows"
    minimum_version = "0.1.0"
    command_name = "flows"
    docstring = "Live web UI for research-step runs"
  }

}
